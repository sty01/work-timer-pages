<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NP3BSLWLTB"></script>
    <script>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="在宅ワークの作業時間を記録できる、ログイン不要の作業タイマーです。">
    <title>作業タイマー | 在宅ワーク用の作業時間記録</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js?v=20260614-1"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <h1 data-i18n="hero-title">作業タイマー＆ウォッチ</h1>
        <p class="lead" data-i18n="hero-lead">左側が作業タイマー、右側が作業時間カウンターになっています。<br>在宅ワークや勉強の時間管理に最適です。</p>
      </header>

      <section class="workspace" aria-label="作業タイマーと作業時間">
        <article class="panel timer-panel">
          <div class="panel-heading">
            <h2>
              <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M5 2h14" />
                <path d="M5 22h14" />
                <path d="M19 2v4c0 3.8-3.1 7-7 7s-7-3.2-7-7V2" />
                <path d="M19 22v-4c0-3.8-3.1-7-7-7s-7 3.2-7 7v4" />
                <!-- 砂の描写 -->
                <path class="top-sand" d="M7.5 6.5q4.5 1.5 9 0c0 0-0.5 3.5-4.5 6.5c-4-3-4.5-6.5-4.5-6.5Z" fill="currentColor" stroke="none" />
                <path class="sand-stream" d="M12 13v6" stroke-dasharray="1.5 1.5" opacity="0.4" />
                <path class="bottom-sand" d="M9.5 21.2h5l-2.5-2.2Z" fill="currentColor" stroke="none" />
              </svg>
              <span data-i18n="timer-title">作業タイマー</span>
            </h2>
            <span class="status-pill" data-timer-status data-state="idle">待機中</span>
          </div>

          <div class="time-display" data-timer-display>00:25:00</div>

          <div class="time-inputs" aria-label="タイマー時間設定">
            <label>
              <span data-i18n="hour-label">時</span>
              <input type="number" min="0" max="23" value="0" inputmode="numeric" data-timer-hours>
            </label>
            <label>
              <span data-i18n="minute-label">分</span>
              <input type="number" min="0" max="59" value="0" inputmode="numeric" data-timer-minutes>
            </label>
            <label>
              <span data-i18n="second-label">秒</span>
              <input type="number" min="0" max="59" value="0" inputmode="numeric" data-timer-seconds>
            </label>
            <button class="time-clear-button" type="button" aria-label="設定時間をゼロに戻す" title="設定時間をゼロに戻す" data-timer-clear>
              <span class="reset-arrow-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                  <path d="M3 3v5h5" />
                </svg>
              </span>
            </button>
          </div>

          <div class="preset-row" aria-label="プリセット">
            <button type="button" data-preset-seconds="10">+10秒</button>
            <button type="button" data-preset-seconds="30">+30秒</button>
            <button type="button" data-preset-seconds="60">+1分</button>
            <button type="button" data-preset-seconds="300">+5分</button>
            <button type="button" data-preset-seconds="600">+10分</button>
            <button type="button" data-preset-seconds="1800">+30分</button>
            <button type="button" data-preset-seconds="3600">+1時間</button>
          </div>

          <div class="control-grid">
            <button class="primary" type="button" data-timer-start data-i18n="btn-start">スタート</button>
            <button type="button" data-timer-stop data-i18n="btn-stop">ストップ</button>
            <button type="button" data-timer-reset data-i18n="btn-reset">リセット</button>
            <button type="button" data-timer-restart data-i18n="btn-restart">リスタート</button>
          </div>
        </article>

        <article class="panel work-panel">
          <div class="panel-heading">
            <h2>
              <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="13" r="8" />
                <path d="M12 2v3M10 2h4" />
                <path class="stopwatch-hand" d="M12 9v4l2 2" />
              </svg>
              <span data-i18n="work-title">総作業時間</span>
            </h2>
            <span class="status-pill" data-work-status data-state="idle">待機中</span>
          </div>

          <div class="work-display-container">
            <div class="time-display work-total" title="クリックして編集" data-work-display><span data-work-click="hours">00</span>:<span data-work-click="minutes">00</span>:<span data-work-click="seconds">00</span></div>
            
            <div class="time-display work-total work-edit-mode hidden" data-work-edit-container>
              <input type="number" min="0" max="99" value="0" inputmode="numeric" data-work-edit-hours>:
              <input type="number" min="0" max="59" value="0" inputmode="numeric" data-work-edit-minutes>:
              <input type="number" min="0" max="59" value="0" inputmode="numeric" data-work-edit-seconds>
            </div>

            <div class="secondary-time-displays">
              <div class="secondary-time-item">
                 <span class="secondary-time-label" data-i18n="rest-label">休憩時間</span>
                <span class="secondary-time-val" data-rest-display>00:00:00</span>
              </div>
            </div>
          </div>

          <div class="state-actions" aria-label="作業状態">
             <button class="work-start" type="button" data-work-start data-i18n="btn-work-start">作業開始</button>
             <button class="work-rest" type="button" data-work-rest data-i18n="btn-work-rest">休憩</button>
             <button class="work-reset-action" type="button" data-work-reset data-i18n="btn-work-reset">リセット</button>
             <button class="work-end" type="button" data-work-end data-i18n="btn-work-end">作業終了</button>
          </div>

          <div class="log-action-container">
            <button class="view-log-button" type="button" data-view-log>
              <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="16" height="16">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
               <span data-i18n="btn-view-log">作業ログを見る</span>
            </button>
          </div>
        </article>
      </section>
    </main>

    <aside class="ad-slot" aria-label="広告">
      <script type="text/javascript">rakuten_design="slide";rakuten_affiliateId="13766f1c.a5e2210d.13766f1d.63cb183a";rakuten_items="ranking";rakuten_genreId="0";rakuten_size="728x90";rakuten_target="_blank";rakuten_theme="gray";rakuten_border="off";rakuten_auto_mode="on";rakuten_genre_title="off";rakuten_recommend="on";rakuten_ts="1781397999071";</script>
      <script type="text/javascript" src="https://xml.affiliate.rakuten.co.jp/widget/js/rakuten_widget.js?20230106"></script>
    </aside>

    <div class="volume-control-container">
      <div class="volume-control">
        <button type="button" class="volume-mute-toggle" aria-label="ミュート切り替え" data-volume-mute-toggle>
          <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="18" height="18">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <path class="volume-waves" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
            <line class="mute-slash" x1="22" y1="2" x2="2" y2="22" />
          </svg>
        </button>
        <label for="volume-slider" data-i18n="volume-label">音量</label>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" data-volume-slider>
        <span class="volume-percentage" data-volume-percentage>50%</span>
      </div>

      <div class="lang-selector">
        <button type="button" class="lang-btn" data-lang="ja">日本語</button>
        <button type="button" class="lang-btn" data-lang="en">English</button>
      </div>
    </div>

    <footer class="site-footer">
      <strong data-i18n="footer-title">作業タイマー</strong>
      <span data-i18n="footer-desc">在宅ワークの作業時間をブラウザ内に保存する無料ツールです。</span>
      <a href="privacy.html" data-i18n="footer-policy">プライバシーポリシー</a>
    </footer>

    <dialog id="log-dialog" class="log-modal">
      <div class="modal-header">
        <h2 data-i18n="modal-title">作業ログ</h2>
        <button type="button" class="close-button" data-close-log aria-label="閉じる">&times;</button>
      </div>
      <div class="modal-body">
        <div class="log-list-container"></div>
      </div>
    </dialog>
  </body>
</html>
