      <h1>プライバシーポリシー</h1>
      <p>作業タイマーは、在宅ワークの作業時間を記録するためのWebアプリです。</p>

      <section>
        <h2>保存する情報</h2>
        <p>作業時間は、ご利用中のブラウザのローカルストレージに保存されます。運営者のサーバーへ作業記録を送信しません。</p>
      </section>

      <section>
        <h2>広告について</h2>
        <p>今後、Google AdSenseなどの広告配信サービスを利用する場合があります。広告配信事業者がCookie等を使用することがあります。</p>
      </section>

      <section>
        <h2>免責事項</h2>
        <p>ブラウザのデータ削除、端末変更、プライベートブラウズの利用により、保存された作業記録が消える場合があります。</p>
      </section>
